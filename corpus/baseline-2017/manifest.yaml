    keyword anchoring.
  - Full-text PDFs not acquired in this pass (STEP 4 deferred). Abstracts-only corpus
    is sufficient for L1/L2 Knowledge Map construction and Phase 3 hypothesis generation.
    Full-text acquisition can be run on-demand for RAG lookups.
  - No embeddings generated in this pass. ChromaDB indexing deferred to Phase 3
    (just-in-time when retrieval is needed).

