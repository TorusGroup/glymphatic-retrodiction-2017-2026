# ── Notes ──────────────────────────────────────────────────────────────────

notes: |
  Este é um SCHEMA, não dados reais.
  Instâncias preenchidas vão em:
    - predictions-sealed-draft.yaml (Phase 3, pre-audit)
    - predictions-sealed.yaml (Phase 3, post-audit, hash-sealed)

  Validator: bin/validate-predictions.js (Phase 3 deliverable)
  Hash tool: bin/seal-predictions.sh (Phase 3 deliverable)

  Toda modificação neste schema requer bump de schema_version.
